discovered_connections:
  - source: mixture-of-experts
    target: moe-serving
    insight: "Sparse MoE capacity overflow and MoE Serving bottlenecks are the same max-load lesson at two scales: the learner first sees per-expert slots drop token-expert calls, then carries that invariant into serving where a hot expert can dominate layer latency despite low average compute."
  - source: llm-serving
    target: long-context
    insight: "LLM Serving's decode/KV-read bottleneck and Long Context's KV-memory constraint are one systems pressure expressed at different horizons: per-token decode bandwidth becomes long-context memory management as T grows."
  - source: moe-serving
    target: speculative-decoding
    insight: "MoE Serving and Speculative Decoding both teach that a nominal compute reduction does not guarantee latency improvement. Sparse activation needs balanced routing/fabric; speculative decoding needs high draft-target agreement before fewer target passes become real speed."
  - source: flow-matching
    target: score-matching
    insight: "Both demos train learners to predict a hidden vector label from a visible stochastic/generative setup: Flow Matching asks for the conditional velocity u_t = x1 - x0 along a paired path, while Score Matching asks for the conditional DSM target against the injected noise residual."
  - source: score-matching
    target: diffusion
    insight: "Score Matching's conditional denoising target is easiest to carry forward when paired with the diffusion forward process: the alpha_bar/sigma corruption setup creates the residual whose negative scaled direction becomes the DSM vector label."
  - source: rlhf
    target: reward-hacking
    insight: "RLHF's finite-action reward reweighting and reward hacking's proxy-gap diagnostic should be learned as one causal chain: the reward model can move probability mass through the reference, but the same optimization pressure can raise proxy score while hidden target utility falls."
  - source: kto
    target: dpo
    insight: "KTO and DPO both use policy/reference log-ratios, but KTO grounds binary desirable/undesirable labels against a KL-derived baseline while DPO compares winner-loser relative odds. The shared evidence loop should make that difference portable instead of memorized."
  - source: diffusion
    target: vaes
    insight: "Both demos ask learners to predict a hidden quantitative diagnostic from a visible generative process: diffusion predicts when alpha_bar/noise destroys structure, while VAE ELBO predicts whether the inference gap comes from q's location/scale or family. Sharing the same evidence loop helps the learner transfer from corruption schedules to variational gap diagnostics."
  - source: dpo
    target: reward-hacking
    insight: "DPO's reference-relative comparator and reward-hacking's proxy/objective mismatch should share a future evidence-loop audit because both teach that an update signal is not the same thing as the intended human preference."
  - source: structured-decoding
    target: tree-search-reasoning
    insight: "Both demos teach stateful constrained choice: a parser state filters next-token actions, while a visible prefix tree backs up verifier-scored search actions. Sharing the same Predict -> Observe -> Ground -> Carry loop helps learners transfer the habit from token-level decoding to reasoning-time search."
  - source: attention-serving-flagship-module
    target: graph-route-saved-progress
    insight: The flagship module now has route state, equation objects, calculators, decoding settings, and discussion anchors; saving those into graph-route progress would turn a good demo into a durable Pro workflow.
  - source: paper-mapper-equation-object-route
    target: graph-route-saved-progress
    insight: Equation objects now carry concept route and source-box metadata, so the next product step is saving those objects into a durable learning path that the graph and AI tutor can reopen later.
  - source: paper-mapper-ocr-and-coordinate-parser
    target: paper-mapper-equation-object-route
    insight: Once PDF equations have page, line, bbox, parser confidence, and OCR status, they can become clickable equation objects rather than inert extracted strings.
  - source: paper-mapper-robust-pdf-layout-parser
    target: paper-mapper-ocr-and-coordinate-parser
    insight: Operator-aware selectable-text extraction is enough for many arXiv PDFs, but scanned papers, custom font encodings, and equation-layout citations need OCR and coordinate-grade blocks before the mapper can feel research-grade.
  - source: paper-mapper-real-pdf-parser
    target: paper-mapper-robust-pdf-layout-parser
    insight: A lightweight text-stream parser proves the ingestion loop, but serious paper understanding needs parser-quality signals, layout order, font-decoding coverage, and OCR fallback before PDF citations feel research-grade.
  - source: paper-mapper-pdf-equation-extractor
    target: equation-explainer
    insight: Equation explainers become trustworthy paid objects only when every formula can point back to a source page and line instead of floating free of the paper.
  - source: paper-mapper-live-ingestion
    target: paper-mapper-pdf-equation-extractor
    insight: arXiv metadata is enough to verify identity and abstracts, but the paid paper-understanding loop needs PDF-local spans so equation explainers and claim checks can cite the exact page or extracted math block.
  - source: paper-mapper-source-grounding
    target: paper-mapper-live-arxiv-pdf-ingestion
    insight: The mapper can earn trust before the backend exists by showing what is grounded in the user's pasted text and internal concept pages, while reserving author/date/venue/benchmark claims for live external ingestion.
  - source: graph-query-engine
    target: graph-route-saved-progress
    insight: "A computed route becomes a product loop only when it can persist: the known concepts, target, next repair, and attached paper/equation/lab objects should become a saved learning path that the AI tutor can reuse."
  - source: graph-product-centerpiece
    target: paper-to-concept-mapper
    insight: The paper mapper should not end at a summary; its output should become a typed graph route with attached equations, labs, claims, and discussion objects so learning paths can compound.
  - source: paper-to-concept-mapper
    target: attention-serving-flagship-module
    insight: The most monetizable first loop is not generic AI chat; it is a paper-understanding workflow anchored to the transformer inference path where attention math, KV memory, long context, and serving tradeoffs are all already present in the atlas.
  - source: sparse-autoencoders
    target: homepage-shell
    insight: Interpretability visuals work best when the site shell already looks like a notebook or lab surface; the surrounding UI can either support or dilute the idea that features are being inspected, not merely illustrated.
  - source: notebook-layout
    target: llm-serving
    insight: Systems concepts need persistent stage-and-explanation layouts because the moving parts matter over time; a notebook shell is a pedagogical requirement, not just a visual preference.
  - source: sparse-autoencoders
    target: activation-steering
    insight: Once internal activations are decomposed into reusable sparse features, steering stops being a blind vector tweak and becomes targeted intervention on named latent directions.
  - source: ssm-hybrids
    target: long-context
    insight: "Long-context pressure is what makes hybrid recurrence attractive: attention handles local retrieval while the fixed-size state avoids unbounded KV-cache growth."
  - source: retrieval-augmented-generation
    target: test-time-compute
    insight: "Adaptive retrieval is a form of inference-time compute allocation: the system can spend extra search and ranking effort only when the query needs external evidence."
  - source: swiglu
    target: residual-connections
    insight: SwiGLU makes transformer MLP blocks more expressive, but the residual path is what lets those gated updates act like controlled writes rather than complete rewrites of the token state.
  - source: grouped-query-attention
    target: llm-serving
    insight: Serving-time KV-cache memory scales with cached KV heads rather than query heads, so Hkv is a first-class deployment constraint once decode bandwidth and long-context memory dominate.
  - source: multimodal
    target: retrieval-augmented-generation
    insight: Modern retrieval is increasingly multimodal; once images and text share an embedding space, RAG becomes a general memory layer rather than a text-only document fetch.
  - source: residual-connections
    target: layer-normalization
    insight: Pre-norm transformers rely on residual pathways to keep a stable shared stream; normalization works as a controlled correction because the skip path preserves identity.
  - source: sgd-momentum
    target: gradient-clipping
    insight: Momentum turns consistent gradients into larger effective steps, so clipping becomes the safety valve that stops rare spikes from turning accumulated velocity into instability.
  - source: tokenization-vocabulary
    target: efficient-attention
    insight: Token counts determine context length and KV cache growth; tokenizer choices directly change inference memory and latency.
  - source: rope
    target: long-context
    insight: RoPE phase behavior is the main constraint in length extrapolation; long-context methods often rescale/interpolate positions to avoid phase drift.
