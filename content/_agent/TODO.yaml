  - date: 2026-05-22
    summary: "Continued the account-memory north-star path by adding the app-owned identity boundary behind the contract-only API. resolveAccountMemoryAuth now returns explicit states for missing session, Clerk session requiring app-owned users.id mirroring, invalid dev owner UUID, and valid dev app-owned user ownership. POST /api/me/learning-route-snapshots uses that helper before preparing DB-shaped route/observation inserts, so the server can explain the next blocker without ever treating Clerk user_... ids as owner_user_id."
