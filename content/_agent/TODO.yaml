  - concept: double-descent-substantive-claim-review
    date: 2026-05-08T00:00:00.000Z
    action: connected
    notes: "Marked the Double Descent central claim as substantively reviewed after a two-lane review with Oracle/GPT Pro and a GPT-5.3 Codex x-high audit. Belkin et al. support the empirical capacity-risk curve that extends the classical U-shape beyond interpolation, with high risk near the interpolation threshold and lower risk in larger overparameterized regimes. Nakkiran et al. support model-wise and epoch-wise double descent plus sample-count/non-monotonic regimes where more data can hurt. Oracle passed the bounded source claim; the 5.3 audit blocked treating #interactive-demo as substantive evidence because it is synthetic and includes a separate grokking tab. The reviewed refs are therefore source spans only; the min-norm math/code and demo remain teaching witnesses outside the reviewed evidence. #code-witness-1 now self-checks a fixed synthetic linear task with zero train error at d=n, a test-error spike at interpolation, and a second descent. The generated claim-evidence queue now reports 47 substantive reviews and 4 pending published reviews; Scaling Laws is the next top queue item. No auth, database, API route, protected page, or synced learner memory was introduced."
  - concept: sparse-autoencoders-substantive-claim-review
    date: 2026-05-08T00:00:00.000Z
    action: connected
    notes: "Marked the Sparse Autoencoders central claim as substantively reviewed after a two-lane review with Oracle/GPT Pro and a GPT-5.3 Codex x-high audit. Bricken et al. support SAE dictionary learning over transformer activations with a ReLU encoder, decoder/dictionary reconstruction, MSE plus L1 sparsity, and hidden activations as learned features. Gao et al. support reconstruction of language-model activations from sparse bottlenecks, L0/MSE evaluation, reconstruction-sparsity tradeoffs, and TopK direct sparsity control. The 5.3 audit blocked the first local witness state because the code used a fixed random dictionary, so #code-witness-1 now trains a tiny NumPy encoder/decoder SAE and asserts that higher lambda lowers active latents while increasing reconstruction MSE. The synthetic demo remains useful UX but is intentionally outside this reviewed claim. The generated claim-evidence queue now reports 46 substantive reviews and 5 pending published reviews; Double Descent is the next top queue item. No auth, database, API route, protected page, or synced learner memory was introduced."
  - concept: representations-substantive-claim-review
    date: 2026-05-08T00:00:00.000Z
    action: connected
    notes: Marked the Representations central claim as substantively reviewed after a two-lane review with Oracle/GPT Pro and a GPT-5.3 Codex x-high audit. Bengio et al. support representation learning as learned transformations/features that make useful information or explanatory factors easier for predictors to extract. Peters et al. support ELMo as sentence-contextual token representations from biLM layer states, including task-specific layer weighting and polysemy disambiguation. The local first math object now witnesses both the extractor shape z=f_theta(x), a_hat=g_psi(z) and the ELMo task-weighted biLM layer combination. The code witness now uses a small contextual bank example to show static versus river/money contexts moving along a probe, while the broader representation-geometry demo remains intentionally outside this reviewed claim. The generated claim-evidence queue now reports 45 substantive reviews and 6 pending published reviews; Sparse Autoencoders is the next top queue item. No auth, database, API route, protected page, or synced learner memory was introduced.
  - concept: vaes-substantive-claim-review
    date: 2026-05-08T00:00:00.000Z
    action: connected
    notes: "Marked the VAEs central claim as substantively reviewed after a two-lane review with Oracle/GPT Pro and a GPT-5.3 Codex x-high audit. Kingma/Welling support the recognition model as approximate posterior, the ELBO gap KL(q||posterior), the reconstruction-minus-prior-KL decomposition, and Gaussian reparameterization; Rezende et al. independently support the recognition-model, lower-bound/free-energy, reconstruction/regularization, and stochastic-backprop structure. The GPT-5.3 audit caught stale math-object refs before completion, so #math-object-1 now exports the latent joint/marginal/posterior and #math-object-2 exports the ELBO identity/decomposition plus reparameterized sample. The code witness now verifies both the exact finite ELBO-gap identity and a one-sample pathwise-gradient finite-difference check, and the demo remains prediction-gated. The generated claim-evidence queue now reports 44 substantive reviews and 7 pending published reviews; Representations is the next top queue item. No auth, database, API route, protected page, or synced learner memory was introduced."
  - concept: score-matching-substantive-claim-review
    date: 2026-05-08T00:00:00.000Z
    action: connected
    notes: Marked the Score Matching central claim as substantively reviewed after a two-lane review with Oracle/GPT Pro and a GPT-5.3 Codex x-high audit. Hyvarinen supports score matching for continuous non-normalized models where the data-gradient score removes Z(theta) and the implicit objective uses squared score plus divergence terms. Vincent supports the Gaussian conditional DSM target (x-tilde_x)/sigma^2, equivalently -epsilon/sigma under x_tilde=x+sigma epsilon, and the DSM/SM connection. Song et al. support using estimated time-dependent perturbed-data scores in reverse-time SDE sampling and the corresponding probability-flow ODE. The first two exported math objects now cover the score/SM objective plus DSM/SDE/ODE bridge, the code witness checks the two DSM target formulas, and the notebook demo no longer leaks hidden target direction, magnitude, marginal score, or signed formula before reveal. The generated claim-evidence queue now reports 43 substantive reviews and 8 pending published reviews; VAEs is the next top queue item. No auth, database, API route, protected page, or synced learner memory was introduced.
  - concept: normalizing-flows-substantive-claim-review
    date: 2026-05-08T00:00:00.000Z
    action: connected
    notes: Marked the Normalizing Flows central claim as substantively reviewed after a two-lane review with Oracle/GPT Pro and a GPT-5.3 Codex x-high audit. Rezende and Mohamed support normalizing flows as sequences of invertible maps transforming a simple initial density into a richer one, derive the one-step inverse-Jacobian change-of-variables update, and give the finite-flow log-density formula as base log density minus summed forward log determinants. The local math, affine code witness, and demo instantiate preimage lookup plus inverse-Jacobian log-volume correction. The demo-state handoff was also tightened so hidden determinant/log-likelihood terms are not emitted before reveal. The generated claim-evidence queue now reports 42 substantive reviews and 9 pending published reviews; Score Matching is the next top queue item. No auth, database, API route, protected page, or synced learner memory was introduced.
