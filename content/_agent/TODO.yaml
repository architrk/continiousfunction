discovered_connections:
  - source: tokenization-vocabulary
    target: efficient-attention
    insight: "Token counts determine context length and KV cache growth; tokenizer choices directly change inference memory and latency."

  - source: rope
    target: long-context
    insight: "RoPE phase behavior is the main constraint in length extrapolation; long-context methods often rescale/interpolate positions to avoid phase drift."
