claim_checks:
  - id: directional-log-ratio-expected-regret
    status: source-checked
    claim: "KL divergence is a directional expectation under the first distribution of a log probability ratio; it is nonnegative, generally asymmetric, and differs from cross-entropy by the fixed entropy of the target distribution."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Checked Goodfellow Ch.3: KL is E_{x~P}[log(P/Q)], nonnegative, generally asymmetric, and cross-entropy is H(P,Q)=H(P)+D_KL(P||Q)=-E_P log Q. With P fixed, H(P) is constant, so cross-entropy differs from forward KL by fixed target entropy. Local math/code/demo match finite/countable p-weighted log-ratio, support rules, directional terms, nonnegative totals, and H(p,q)=H(p)+KL(p||q)."
    source_ids:
      - goodfellow-2016-deep-learning
    support: "Goodfellow et al. define KL divergence as relative entropy with an expected log-ratio form, relate it to cross-entropy, and use the same probability-information notation for deep learning objectives."
    caveat: "Reviewed finite/countable same-space distributions and Ch3 cross-entropy identity with first distribution fixed. Demo keeps q positive, showing near-misses, not infinite-KL failures. Not measure theory, continuous edge cases, optimization guarantees, VI, or KL alignment uses."
    object_refs:
      - "#source-span-goodfellow-2016-deep-learning"
      - "#math-object-1"
      - "#math-object-2"
      - "#code-witness-1"
      - "#interactive-demo"
short_description: "KL divergence is a directional expected log-probability mismatch between distributions; it explains cross-entropy training, variational inference, and KL-regularized alignment."
