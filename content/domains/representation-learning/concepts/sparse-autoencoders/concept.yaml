claim_checks:
  - id: sae-sparse-dictionary-reconstruction
    status: source-checked
    claim: "Sparse autoencoders learn decoder dictionaries that reconstruct language-model activations from sparse latent codes, trading reconstruction error against sparsity so each activation uses a small set of active latents."
    source_ids:
      - bricken-2023-monosemanticity
      - gao-2024-scaling-sae
    support: "Bricken et al. ground SAEs as dictionary-learning tools for decomposing model activations into learned features. Gao et al. describe SAEs as reconstructing language-model activations from a sparse bottleneck and frame training around the reconstruction-sparsity tradeoff. Local math/code witness the bounded mechanism."
    caveat: "Certifies only SAE reconstruction/sparsity: decoder dictionaries reconstruct LM activations from sparse latents under sparsity objectives. It does not certify universal monosemanticity, causal completeness, interpretability, steering/circuit usefulness, or TopK/gated dominance."
    object_refs:
      - "#source-span-bricken-2023-monosemanticity"
      - "#source-span-gao-2024-scaling-sae"
      - "#math-object-1"
      - "#math-object-2"
      - "#code-witness-1"
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-08"
      reviewer: "codex+oracle+codex-5.3"
      summary: "Bricken et al. support SAE dictionary learning over transformer activations with a ReLU encoder, decoder/dictionary reconstruction, MSE plus L1 sparsity, and hidden activations as learned features. Gao et al. support language-model activation reconstruction from sparse bottlenecks, L0/MSE evaluation, and reconstruction-sparsity plus TopK direct sparsity control. Local math and code witness the bounded mechanism; the synthetic demo is intentionally outside claim refs."
short_description: "Sparse autoencoders learn a reusable dictionary of feature directions so dense model activations can be explained by a small set of interpretable latent factors."
