claim_checks:
  - id: representations-feature-contextual-elmo
    status: source-checked
    claim: "Representation learning trains encoders to transform raw inputs into internal features that make useful factors easier to extract; ELMo-style contextual embeddings make token representations depend on sentence context."
    source_ids:
      - bengio-2013-representation-learning
      - peters-2018-elmo
    support: "Bengio et al. frame representation learning as learning transformations that expose useful explanatory factors and make useful information easier to extract. Peters et al. introduce ELMo contextual word representations from biLM states that model word use and how it varies across linguistic context. Local math/code witness the extractor and contextual-token clauses."
    caveat: "Checks only useful-factor extraction and ELMo-style contextual token dependence. It does not certify InfoNCE, retrieval quality, task vectors, anisotropy fixes, equivariance, parallel transport, or all representation-learning subfields."
    object_refs:
      - "#source-span-bengio-2013-representation-learning"
      - "#source-span-peters-2018-elmo"
      - "#math-object-1"
      - "#code-witness-1"
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-08"
      reviewer: "codex+oracle+codex-5.3"
      summary: "Bengio et al. support representation learning as learned features that make useful information or explanatory factors easier for predictors to extract. Peters et al. support ELMo as sentence-contextual token representations from biLM layer states, including task-specific layer weighting and polysemy disambiguation. Local math and code witness this bounded claim; broader geometry demos stay out of scope."
short_description: "How models turn inputs into vectors whose geometry can expose useful factors, contextual meaning, and similarity structure."
