      - "#interactive-demo"
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-08"
      reviewer: "codex+oracle+codex-5.3"
      summary: "Rezende and Mohamed support normalizing flows as invertible-map sequences that transform a simple initial density into a richer one, derive finite change-of-variables density updates using inverse/forward Jacobian determinants, and give the composed log-density formula as base log density minus summed forward logdet terms. Local math, affine code, and demo instantiate preimage lookup plus inverse-Jacobian log-volume correction."
short_description: "Invertible transforms trained with change-of-variables: tractable transformed densities and sampling, with architectural constraints to make the needed Jacobian determinants tractable."
