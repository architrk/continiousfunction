claim_checks:
  - id: invertible-change-of-variables-logdet
    status: source-checked
    claim: "Normalizing flows compose invertible maps to turn a simple initial density into a richer one; for a tractable finite flow, the log density at a point is computed exactly by evaluating the base log density at the corresponding preimage and adding the inverse-Jacobian log determinant."
    source_ids:
      - rezende-2015-normalizing-flows
    support: "Rezende and Mohamed define a normalizing flow as transforming a probability density through a sequence of invertible mappings, state that repeated change-of-variables moves an initial density through that sequence, and derive finite-flow density updates using Jacobian determinants. The page equations, code, and demo instantiate inverse-form base-density lookup plus log-volume correction."
    caveat: "Rezende and Mohamed frame flows for variational approximate posteriors and density transformation; they do not by themselves justify broad claims about modern data modeling, sampling quality, stability, or universal exact-likelihood practicality."
