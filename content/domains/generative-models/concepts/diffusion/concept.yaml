claim_checks:
  - id: forward-noising-noise-prediction-score-bridge
    status: source-checked
    claim: "Diffusion can be taught as gradual corruption plus learned reverse denoising: Sohl-Dickstein frames forward diffusion/reversal; Ho supplies q(x_t|x_0), reparameterized x_t, and epsilon-prediction MSE; Song Score SDE supplies the score-based reverse-time sampling bridge."
    source_ids:
      - sohl-dickstein-2015-nonequilibrium
      - ho-2020-ddpm
      - song-2020-score-sde
    support: "Sohl-Dickstein supports iterative forward corruption plus learned reverse diffusion. Ho supports the DDPM closed-form q(x_t|x_0), reparameterized x_t sample, and simplified L_simple epsilon-prediction MSE. Song supports estimating time-dependent scores and using the reverse-time SDE/numerical solvers as the score-based reverse-sampling bridge. Local math/code/demo witness DDPM forward noising only."
    caveat: "Exported math refs cover only q(x_t|x_0) and reparameterized x_t. Code/demo isolate forward noising/backward replay, not a trained sampler. Excludes guidance, latent diffusion, sampler variants, flow matching, production image quality, and broad modality claims."
