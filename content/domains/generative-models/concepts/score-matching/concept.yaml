claim_checks:
  - id: score-field-denoising-reverse-dynamics
    status: source-checked
    claim: "Score matching fits a model score grad_x log p_theta(x) while avoiding the normalizing constant; under Gaussian corruption x_tilde=x+sigma epsilon, the conditional denoising target is -(x_tilde-x)/sigma^2=-epsilon/sigma; estimated time-dependent scores can drive reverse-time SDE/ODE sampling dynamics."
    source_ids:
      - hyvarinen-2005-score-matching
      - vincent-2011-denoising-score
      - song-2020-score-sde
    support: "Hyvarinen supports score matching for continuous non-normalized models because the data score removes Z(theta). Vincent supports the Gaussian DSM target (x-x_tilde)/sigma^2 and DSM/SM equivalence. Song supports reverse SDE sampling and probability-flow ODE dynamics from estimated time-dependent scores. Local math/code/demo cover the score, DSM scaling, conditional-vs-marginal distinction, and reverse bridge."
    caveat: "Checks the score, Gaussian conditional DSM label under x_tilde=x+sigma epsilon, and estimated-score reverse SDE/probability-flow ODE bridge. Does not claim exact solvers, conditional labels equal marginal scores, high-dimensional quality, or full DDPM/ELBO training."
    object_refs:
      - "#source-span-hyvarinen-2005-score-matching"
      - "#source-span-vincent-2011-denoising-score"
      - "#source-span-song-2020-score-sde"
      - "#math-object-1"
      - "#math-object-2"
      - "#code-witness-1"
      - "#interactive-demo"
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-08"
      reviewer: "codex+oracle+codex-5.3"
      summary: "Hyvarinen supports non-normalized score matching: the data-gradient score removes Z(theta) and the implicit objective uses squared score plus divergence terms. Vincent supports the Gaussian conditional DSM target (x-x_tilde)/sigma^2 = -epsilon/sigma and DSM/SM equivalence. Song supports estimated time-dependent scores in reverse SDE sampling and probability-flow ODEs. Local math, code, and demo align with this bounded mechanism without pre-reveal target leakage."
short_description: "Learn the score field grad_x log p(x) without normalizing constants. Denoising score matching turns diffusion training into simple regression on noise."
