    note: "Provides the preference-learning setup where learned rewards can become overoptimized proxies."
claim_checks:
  - id: reward-hacking-selected-proxy-error
    status: source-checked
    claim: "Reward hacking can be modeled as selected proxy error: stronger optimization can raise expected learned reward by shifting probability toward outputs where the proxy overestimates true utility; KL anchoring and page-local uncertainty penalties can slow this shift but do not make the proxy the target."
    source_ids:
      - amodei-2016-concrete-safety
      - gao-2022-reward-overoptimization
    support: "Amodei grounds reward hacking as an objective that can be gamed or pervert designer intent. Gao grounds RLHF overoptimization of an imperfect reward-model proxy: proxy optimization can raise proxy reward while gold/ground-truth reward peaks or falls. Local math/code/demo instantiate finite-action selected proxy error, KL anchoring, and page-local LCB scoring."
    caveat: "Toy finite-action witness only. Gao's KL result is mixed and hyperparameter-sensitive; the uncertainty/LCB penalty is page-local, not sourced as a sufficient mitigation. No direct human utility access, universal phase law, prevention claim, or broad alignment guarantee."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Amodei supports reward hacking as a wrong-objective/gamed-reward problem. Gao supports RLHF reward-model overoptimization where proxy optimization can improve learned reward while hindering gold reward. The page's finite-action math/code/demo are acceptable toy witnesses for selected proxy error, KL-softmax shift, and local uncertainty braking."
    object_refs:
      - "#source-span-amodei-2016-concrete-safety"
      - "#source-span-gao-2022-reward-overoptimization"
      - "#math-object-1"
      - "#math-object-2"
      - "#code-witness-1"
      - "#interactive-demo"
short_description: "When an imperfect preference proxy is optimized past its validation regime, policy mass shifts toward reward-model errors; KL, ensembles, LCBs, and monitoring slow this down but do not make the proxy true."
