claim_checks:
  - id: preference-reward-model-kl-policy-optimization
    status: source-checked
    claim: "Preference-based RLHF learns a reward model from human comparisons and optimizes a policy against it; InstructGPT-style RLHF adds SFT and PPO with a KL penalty to the SFT/reference policy."
    source_ids:
      - christiano-2017-human-preferences
      - ouyang-2022-instructgpt
    support: "Christiano trains a reward predictor from trajectory-segment comparisons and optimizes a policy on predicted reward. Ouyang describes demonstrations -> SFT, rankings -> reward model, and PPO against RM reward with per-token KL to the SFT policy. Local math/code/demo instantiate reward gaps, sigmoid preferences, pi_ref*exp(r/beta), KL, shift invariance, and proxy-gap warnings."
    caveat: "Reviews only preference-modeling and KL-regularized optimization mechanics. It does not certify reward as true human objective, PPO exact attainment of the finite-action optimum, PPO-ptx/pretraining-gradient details, reward-hacking prevention, or broad alignment guarantees."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Christiano supports learning a reward predictor from pairwise trajectory preferences and optimizing a policy on predicted reward. Ouyang supports InstructGPT demonstrations -> SFT, rankings -> RM, and PPO against RM with per-token KL to SFT. Local math/code/demo are toy witnesses for sigmoid preferences, KL probability shaping, shift invariance, and proxy-gap caveats."
