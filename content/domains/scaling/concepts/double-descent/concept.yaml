claim_checks:
  - id: double-descent-interpolation-empirical-pattern
    status: source-checked
    claim: "Double descent is an empirical test-error pattern: error may peak near the interpolation threshold, then decline again in larger overparameterized models; Nakkiran et al. show model-wise, epoch-wise, and sample-count variants."
    source_ids:
      - belkin-2018-bias-variance
      - nakkiran-2019-deep-double-descent
    support: "Belkin et al. frame double descent as an empirical risk curve extending the classical U-shape beyond interpolation: near-threshold predictors can have high risk while more capacity beyond interpolation can lower risk. Nakkiran et al. report model-wise and epoch-wise double descent in deep-learning tasks plus sample-count regimes where more training data can hurt."
    caveat: "Empirical and conditional; not guaranteed for every model, dataset, optimizer, length, regularization, or noise regime. Excludes grokking, optimizer implicit bias, minimum-norm theory, the synthetic demo as empirical evidence, and universal gains from overparameterization."
    object_refs:
      - "#source-span-belkin-2018-bias-variance"
      - "#source-span-nakkiran-2019-deep-double-descent"
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-08"
      reviewer: "codex+oracle+codex-5.3"
      summary: "Belkin supports the interpolation-threshold pattern: risk can peak near interpolation and fall again past it. Nakkiran supports model-wise, epoch-wise, and sample-count/non-monotonic deep double descent. Oracle passed the bounded source claim; GPT-5.3 kept the synthetic demo and min-norm math/code outside reviewed evidence."
short_description: "Test error can peak at the interpolation threshold then fall again as models get larger: why modern overparameterized nets still generalize."
