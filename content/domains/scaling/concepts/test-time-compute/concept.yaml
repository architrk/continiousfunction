      summary: "Reviewed arXiv/source TeX: Wang et al. support repeated diverse reasoning-path sampling and answer aggregation; Lightman et al. support reward-model best-of-N selection and high-scoring wrong-answer failure cases; Snell et al. support verifier-search test-time compute, best-of-N baselines, and PRM exploitation/degradation. Local math/code/demo support the finite coverage-vs-selection model."
