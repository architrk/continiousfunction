claim_checks:
  - id: best-of-n-verifier-selection
    status: source-checked
    claim: "In the page's finite best-of-N model, extra test-time compute can improve selected correctness when more samples cover good traces and the verifier ranks them highly; as N grows, clean ranking can help, while a rare high-scoring verifier error can be selected more often."
    source_ids:
      - wang-2022-self-consistency
      - lightman-2023-verify-step-by-step
      - snell-2024-test-time-compute
    support: "Wang et al. ground drawing multiple reasoning paths and aggregating answers. Lightman et al. evaluate reward models by best-of-N search: select the sampled solution ranked highest by the reward model. Snell et al. analyze test-time compute via best-of-N and verifier/PRM search. The local math/code/demo show coverage vs verifier selection and noisy-verifier failure."
    caveat: "This checks a finite, fixed-distribution best-of-N verifier model, not tree search, adaptive reasoning policies, universal scaling laws, exact serving costs, calibrated verifier probabilities, or guaranteed gains from more inference compute."
