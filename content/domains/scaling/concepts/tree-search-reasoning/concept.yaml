claim_checks:
  - id: prefix-frontier-verifier-backup
    status: source-checked
    claim: "Tree-search reasoning allocates inference budget over visible partial prefixes: a generator proposes next thoughts, verifier-style scores rank prefixes, a frontier rule expands promising nodes, and max backups propagate visible continuation scores; the demo shows noisy scores can select a wrong path."
    source_ids:
      - yao-2023-tree-of-thoughts
      - lightman-2023-verify-step-by-step
    support: "Yao et al. define ToT as search over states representing partial solutions, with thought generation, state evaluation, and BFS/DFS-style search. Lightman et al. ground PRMs as step-level correctness predictors. The page teaches a finite visible tree with edge scores, frontier expansion, max backups, and a noisy-verifier failure."
    caveat: "This checks the page's finite prefix-tree teaching model. It does not claim full MCTS/UCT/PUCT, convergence or optimal-planning guarantees, calibrated verifier scores, real serving cost, or immunity to reward hacking."
