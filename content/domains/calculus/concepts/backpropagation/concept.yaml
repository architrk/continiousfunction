claim_checks:
  - id: backpropagation-reverse-pass-gradients
    status: source-checked
    claim: "Backpropagation computes neural-network gradients by storing needed forward-pass values, then applying the chain rule backward from a scalar loss: each layer receives a downstream sensitivity, combines it with local derivatives/VJPs, and reuses that signal to form parameter gradients in one reverse pass."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Checked Rumelhart/Hinton/Williams for neural-network error back-propagation and weight adjustment, and Baydin et al. for mechanism: backprop is reverse-mode AD on a network objective, with forward intermediate/dependency recording, backward adjoint propagation, local chain-rule accumulation, VJP framing, output-adjoint seed 1, and one reverse pass computing the full scalar-objective gradient. Local math/code/demo instantiate the same feed-forward scalar-loss case with deltas, tanh gates, W^T delta, and dW/db."
    source_ids:
      - rumelhart-1986-backprop
      - baydin-2018-ad-survey
    support: "Rumelhart, Hinton, and Williams introduce back-propagating error signals for adjusting weights; Baydin et al. frame backpropagation as reverse-mode automatic differentiation on computation graphs for efficient derivative evaluation."
    caveat: "Checks the differentiable feed-forward scalar-loss mechanism, not optimizer choice, biological plausibility, recurrent/dynamic variants, full batching, nonsmooth primitives, or stability. Reverse-mode systems may save values directly or recover some through checkpointing."
    object_refs:
      - "#source-span-rumelhart-1986-backprop"
      - "#source-span-baydin-2018-ad-survey"
      - "#math-object-1"
      - "#code-witness-1"
      - "#interactive-demo"
short_description: "Backpropagation applies reverse-mode autodiff to neural networks so one scalar loss can train many parameters."
