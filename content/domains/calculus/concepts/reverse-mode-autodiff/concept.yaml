claim_checks:
  - id: reverse-mode-scalar-loss-gradient
    status: source-checked
    claim: "Reverse-mode AD records a forward evaluation trace of primitive operations and saved values, seeds a scalar output cotangent with 1, then sweeps backward applying local VJPs and += accumulation so one reverse pass computes the full gradient of one scalar loss with respect to many inputs."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Checked Baydin et al. 3.2: reverse mode runs code forward to populate intermediates and record dependencies, then propagates adjoints backward. The example starts from output adjoint 1, accumulates reused-variable cotangents from downstream paths, and gets both input derivatives in one reverse pass. Baydin says for f:R^n->R one reverse application computes the full gradient. Local witnesses match tape values, bar L=1, += pullbacks, VJP/J^T notation, and scalar-loss shape."
    source_ids:
      - baydin-2018-ad-survey
    support: "Baydin et al. describe reverse mode as running code forward to populate intermediate variables and record graph dependencies, then propagating adjoints backward. Their example shows incremental adjoint accumulation and output adjoint 1; they state that for f:R^n->R one reverse-mode application computes the full gradient, matching scalar-valued ML objectives with many parameters."
    caveat: "Checks reverse-mode bookkeeping for one executed differentiable computation: forward tape/saved values, then reverse cotangent sweep with primitive backward rules. Not checkpointing, recomputation, nonsmooth primitives, control flow, framework edge cases, or higher derivatives."
