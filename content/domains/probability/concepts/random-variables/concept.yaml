claim_checks:
  - id: measurable-map-pushforward-expectation
    status: source-checked
    claim: "A random variable is a measurable map from raw outcomes to values; pushing probability through that map gives its distribution, and expectations can be computed from either raw outcomes or the induced value distribution."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Checked MML 6.1.2, 6.2, and 6.4.1: MML defines a probability space and target space T, calls a function X:Omega->T a random variable, defines preimages X^-1(S), gives PX(S)=P(X in S)=P(X^-1(S)), and calls PX, equivalently P composed with X^-1, the law/distribution of X. MML also discusses Borel sigma-algebra technicalities and defines expected values by sums/integrals over p(x). The local math/code/demo make the measurable-Borel condition and finite raw-vs-induced-PMF expectation equality explicit."
    source_ids:
      - deisenroth-2020-mml
    support: "Mathematics for Machine Learning introduces random variables, distributions, expectations, and variance as the probability vocabulary needed for ML, supporting the page's map-from-outcomes and induced-distribution framing."
    caveat: "This checks the standard real-valued and finite teaching framing for random variables, induced laws, expectations, and variance, not full measure-theoretic generality or every stochastic-process setting."
