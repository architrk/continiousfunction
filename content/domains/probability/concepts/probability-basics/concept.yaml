claim_checks:
  - id: event-axioms-conditioning-renormalization
    status: source-checked
    claim: "In a finite probability model, events are subsets of a sample space whose probabilities are nonnegative, add over disjoint unions, total one on the whole space, and get renormalized when conditioning on observed evidence."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-06"
      reviewer: "codex+oracle"
      summary: "Checked MML chapter 6.1-6.3: it defines the sample space as all outcomes, event space as subsets of Omega, assigns each event A a probability P(A) in [0,1], and requires total mass P(Omega)=1. Its finite coin example adds the probabilities of disjoint outcomes in a union, section 6.2 defines conditional probabilities as table fractions, and section 6.3 derives Bayes' rule with evidence normalizing the posterior."
    source_ids:
      - deisenroth-2020-mml
    support: "Mathematics for Machine Learning introduces probability for ML through probability spaces, events, conditional probability, independence, Bayes' theorem, and expectation, matching this page's finite-event and conditioning framing."
    caveat: "This checks the finite-event probability and conditioning bridge used here, not continuous regular conditional probabilities or philosophical interpretations of probability."
