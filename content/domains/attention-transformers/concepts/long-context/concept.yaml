claim_checks:
  - id: position-extrapolation-plus-kv-memory
    status: source-checked
    claim: "Long-context engineering has two separate constraints: positional extrapolation must keep attention usable beyond training lengths, and KV-cache memory management must keep long-context serving feasible."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "RoFormer supports rotary relative-position mechanics; ALiBi supports train-short/test-long extrapolation as a position-representation issue; PagedAttention supports KV-cache memory as a serving bottleneck. Local code/demo are toy witnesses for KV sizing and phase constraints, not serving-system proof."
    source_ids:
      - su-2021-roformer
      - press-2021-alibi
      - kwon-2023-pagedattention
    support: "RoFormer grounds the rotary relative-position mechanism; ALiBi directly frames train-short/test-long length extrapolation as a position-representation problem; PagedAttention directly frames high-throughput serving as constrained by large, dynamic KV-cache memory."
    caveat: "Checks two long-context constraints, not every bottleneck; RoFormer is not a RoPE-scaling recipe, ALiBi is not RoPE, and local code/demo are toy witnesses, not production guarantees."
