sources:
  - id: sennrich-2015-bpe
    kind: paper
    title: "Neural Machine Translation of Rare Words with Subword Units"
    authors: "Sennrich, Haddow, and Birch"
    year: 2015
    url: "https://arxiv.org/pdf/1508.07909v5"
    note: "Primary BPE subword source. Sec. 3.2 initializes a character-symbol vocabulary, repeatedly counts adjacent symbol pairs, merges the most frequent pair, and grows the final symbol vocabulary by merge operations."
  - id: kudo-2018-sentencepiece
    kind: paper
    title: "SentencePiece: A simple and language independent subword tokenizer and detokenizer for Neural Text Processing"
    authors: "Kudo and Richardson"
    year: 2018
    url: "https://arxiv.org/pdf/1808.06226v1"
    note: "Primary SentencePiece source. Describes a language-independent tokenizer/detokenizer that manages vocabulary-id mapping and implements BPE plus unigram language-model subword segmentation."
claim_checks:
  - id: subword-tokenization-segmentation-mechanics
    status: source-checked
    claim: "Subword tokenizers map text to vocabulary items: BPE builds units by repeatedly merging the most frequent adjacent symbols; SentencePiece supports BPE and unigram language-model subword segmentation."
    source_ids:
      - sennrich-2015-bpe
      - kudo-2018-sentencepiece
    support: "Sennrich Sec. 3.2 initializes character symbols, counts adjacent pairs, repeatedly merges the most frequent pair, and grows final vocab by merge count. Kudo/Richardson describe SentencePiece as language-independent tokenization/detokenization with subword sequences, vocab-id mapping, and BPE plus unigram LM segmentation. The first two equations, first code witness, and demo BPE/unigram portions are toy witnesses."
    caveat: "Checks high-level subword vocab, BPE merges, and SentencePiece BPE/unigram mechanics only; not exact LLM tokenizer files, byte fallback, Unicode normalization edges, merge-rank details, vocab-size scaling, downstream capability/cost claims, or the demo's byte/Unicode/cost panes."
    evidence_review:
