claim_checks:
  - id: top-k-routing-activated-compute-load-balance
    status: source-checked
    claim: "Sparse MoE layers use a learned router to choose top-k experts per token, so total expert parameters can grow while active expert compute stays bounded by k; in the cited MoE/Switch designs, load-balancing losses and expert-capacity mechanisms manage skew, overload, dropped tokens, and dispatch/communication costs."
    source_ids:
      - shazeer-2017-sparsely-gated-moe
      - fedus-2021-switch-transformers
    support: "Shazeer defines trainable sparse/noisy top-k gating, many expert FFNs with only selected experts evaluated, and importance/load losses for imbalance. Fedus supports Switch top-1 routing, expert capacity/capacity-factor overflow and dropped tokens, f_i/P_i auxiliary load loss, and reduced-but-present dispatch/communication costs. Local witnesses instantiate router/top-k, load signals, and toy capacity overflow."
    caveat: "Reviewed routing/load/capacity mechanics only. Math/code/demo are toy local witnesses; no exact throughput, quality or specialization, all-to-all/expert-parallel implementation, scheduler optimality, serving latency/cost, or guarantee that MoE improves wall-clock performance."
