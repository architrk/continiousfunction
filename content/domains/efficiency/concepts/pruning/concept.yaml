claim_checks:
  - id: magnitude-mask-storage-vs-speed
    status: source-checked
    claim: "Pruning can be taught as applying a sparsity mask, often with a magnitude threshold: unstructured zeros can compress storage but do not automatically speed dense kernels, while structured filter/channel removal changes tensor shape and can map to dense-kernel acceleration."
    source_ids:
      - han-2015-deep-compression
      - li-2016-pruning-filters
    support: "Han et al. prune small-weight connections below a threshold, retrain remaining sparse connections, store them as CSR/CSC, and benchmark sparse matrix-vector kernels. Li et al. show filter pruning removes whole filters/feature maps, avoids sparse connectivity, and works with dense BLAS. The page math/code/demo instantiate this contrast."
    caveat: "This checks the pruning-mask and deployment-distinction lesson, not exact compression ratios, full retraining schedules, measured speedups, modern pruning methods, sparse-kernel performance on current hardware, or accuracy preservation guarantees."
