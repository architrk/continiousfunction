claim_checks:
  - id: low-bit-scale-outlier-resolution
    status: source-checked
    claim: "Quantization maps floating tensors to low-bit integer levels with scales/dequantization rules, reducing storage/bandwidth but adding reconstruction error; if an outlier sets one shared scale, ordinary values lose resolution, so finer-grained scales or outlier-aware handling can preserve accuracy."
    source_ids:
      - dettmers-2022-llm-int8
      - frantar-2022-gptq
    support: "Dettmers et al. show transformer-scale 8-bit inference needs separate normalization constants and mixed-precision handling for emergent outlier features. Frantar et al. ground GPT-style post-training weight quantization with approximate second-order/error compensation. The page math, code, and demo instantiate scale quantize/dequantize, memory savings, and outlier-driven per-tensor vs per-channel RMSE."
    caveat: "Checks the page's finite uniform-quantization and scale/outlier lesson only; it does not claim a full GPTQ solver, exact LLM.int8 routing, calibrated model accuracy, hardware speedups, activation quantization coverage, or all low-bit methods."
