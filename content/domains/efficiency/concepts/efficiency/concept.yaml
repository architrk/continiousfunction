claim_checks:
  - id: resource-levers-active-compute-trainable-params
    status: source-checked
    claim: "Efficiency is a resource-bottleneck tradeoff: Sze frames compute, memory movement, energy, throughput, and accuracy; LoRA lowers adaptation cost by freezing W and training a low-rank BA update; sparse MoE grows expert capacity while activating only top-k experts per token."
    source_ids:
      - sze-2017-efficient-dnn
      - hu-2021-lora
      - shazeer-2017-sparsely-gated-moe
    support: "Sze et al. ground efficiency as system-level resource tradeoffs rather than one scalar. Hu et al. ground frozen-base, low-rank LoRA adaptation and reduced trainable parameters. Shazeer et al. ground sparse expert routing as increasing capacity without activating every parameter. The code and demo instantiate LoRA trainable-parameter count and MoE active-compute intuition."
    caveat: "This checks the overview resource-lever lesson for system framing, LoRA, and sparse MoE only; it does not source-check distillation, quantization, task vectors, exact speedups, or serving-cost claims."
    object_refs:
      - "#source-span-sze-2017-efficient-dnn"
      - "#source-span-hu-2021-lora"
      - "#source-span-shazeer-2017-sparsely-gated-moe"
      - "#code-witness-1"
      - "#interactive-demo"
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Sze supports efficiency as a system tradeoff across compute, memory/data movement, energy, throughput, accuracy, and hardware/resource constraints. Hu supports LoRA as frozen pretrained weights plus trainable low-rank A/B matrices for W0 + BA adaptation with greatly reduced trainable parameters and adaptation memory/storage cost. Shazeer supports sparse MoE conditional computation with top-k sparse gating so only selected experts are evaluated while capacity can grow without proportional compute."
short_description: "The practical toolkit for making big models cheaper: quantize weights/activations, distill teachers into students, adapt with low-rank updates (LoRA), and use sparsity (MoE)."
