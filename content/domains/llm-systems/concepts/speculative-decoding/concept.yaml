claim_checks:
  - id: draft-verify-lossless-distribution
    status: source-checked
    claim: "Speculative decoding uses a fast draft model to propose multiple tokens and a target model to verify them in parallel, using rejection/residual sampling so the final output distribution matches target-model decoding."
    source_ids:
      - leviathan-2022-speculative-decoding
      - chen-2023-speculative-sampling
    support: "Leviathan defines gamma draft tokens from a faster approximation model, parallel target scoring of draft prefixes, accept/reject filtering, residual sampling from norm(max(0, p - q)), and proves target-distribution sampling. Chen independently describes K-token drafts, parallel target scoring, modified rejection/residual sampling, and preservation within hardware numerics."
    caveat: "Checks lossless sampling under standardized sampling distributions; Chen qualifies the guarantee as within hardware numerics. Not a universal latency guarantee. Code is a toy finite-distribution/residual check plus prefix simulation; demo is a toy speedup witness, not proof."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Leviathan 2022 supports gamma-token drafting, parallel target scoring of draft prefixes, accept/reject filtering, residual sampling from norm(max(0, p - q)), and a proof of target-distribution sampling. Chen 2023 independently supports K-token drafts, parallel scoring, modified rejection/residual sampling, and hardware-numerics-qualified preservation, with reversed p/q notation. Page math follows Leviathan; code is a toy residual/distribution plus prefix check, and demo is toy speedup only."
