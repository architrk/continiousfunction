claim_checks:
  - id: sparse-routing-load-balance
    status: source-checked
    claim: "MoE inference and serving use sparse routing: a gate sends each token to a small subset of experts, so per-expert token counts can become uneven and require load-balancing, capacity buffers, or scheduling/parallelism choices."
    source_ids:
      - shazeer-2017-sparsely-gated-moe
      - fedus-2021-switch-transformer
      - zhu-2025-megascale-infer
    support: "Shazeer supports sparse top-k MoE routing plus importance/load-balancing losses for uneven expert use. Fedus supports top-1 routing, expert-capacity overflow, auxiliary load balancing, and communication-cost tradeoffs. MegaScale-Infer supplies serving-specific support for MoE decoding, token dispatch, attention/FFN disaggregation, M2N/N2M communication, and production expert-load imbalance."
    caveat: "Checks sparse routing, uneven expert load, and load-balancing/scheduling only. Shazeer/Fedus ground model/distributed mechanics; MegaScale-Infer supplies serving scope. Local byte-count, straggler formula, code, and demo are toy witnesses, not universal latency/cost claims."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Shazeer 2017 supports sparse top-k MoE routing and load/importance-balancing losses for uneven expert use. Fedus 2021 supports top-1 routing, capacity overflow, auxiliary load balancing, and communication-cost tradeoffs. MegaScale-Infer 2025 supplies serving evidence for MoE decoding, token dispatch, FFN underutilization from sparsity, attention/FFN disaggregation, M2N/N2M communication in that setup, and production expert-load imbalance. Local math/code/demo remain toy witnesses."
    object_refs:
      - "#source-span-shazeer-2017-sparsely-gated-moe"
      - "#source-span-fedus-2021-switch-transformer"
      - "#source-span-zhu-2025-megascale-infer"
      - "#math-object-2"
      - "#code-witness-1"
      - "#interactive-demo"
short_description: "Serving MoE turns sparse compute into a scheduling problem: routing skew can create stragglers and token-dispatch communication can bottleneck, motivating scheduling and, in systems such as MegaScale-Infer, disaggregated expert-parallel serving."
