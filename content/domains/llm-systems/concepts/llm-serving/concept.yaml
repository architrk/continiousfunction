sources:
  - id: yu-2022-orca
    kind: paper
    title: "Orca: A Distributed Serving System for Transformer-Based Generative Models"
    authors: "Yu et al."
    year: 2022
    url: "https://www.usenix.org/system/files/osdi22-yu.pdf"
    note: "Primary serving-scheduler source. Orca frames generative transformer inference as multi-iteration autoregressive serving, where each iteration generates one output token, and proposes iteration-level scheduling plus selective batching."
  - id: kwon-2023-pagedattention
    kind: paper
    title: "Efficient Memory Management for Large Language Model Serving with PagedAttention"
    authors: "Kwon et al."
    year: 2023
    url: "https://arxiv.org/pdf/2309.06180v1"
    note: "Primary KV-cache serving source. PagedAttention frames high-throughput LLM serving as constrained by huge dynamically growing KV caches, fragmentation, batch-size limits, and paged block allocation."
claim_checks:
  - id: iteration-scheduling-kv-cache-memory
    status: source-checked
    claim: "LLM serving is a multi-iteration scheduling and memory-management problem: autoregressive decode advances one token at a time, batching must adapt between iterations, and KV cache memory can limit throughput."
    source_ids:
      - yu-2022-orca
      - kwon-2023-pagedattention
    support: "Orca supports the scheduling part: generative Transformer serving is multi-iteration autoregressive inference with one output token per iteration, and fixed request-level batches motivate iteration-level scheduling plus selective batching. PagedAttention supports the memory/throughput part: large dynamic KV caches and fragmentation can limit batch size and throughput. Local math/code/demo are toy witnesses."
    caveat: "Checks the serving mechanism only. TTFT/TPOT, goodput, KV formula, code, and demo are toy witnesses, not source-derived formulas or production benchmarks. Does not certify vendor latency, scheduler optimality, hardware bottlenecks, throughput gains, or production guarantees."
    evidence_review:
