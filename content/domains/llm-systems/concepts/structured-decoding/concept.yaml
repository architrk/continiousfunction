claim_checks:
  - id: schema-automaton-token-mask
    status: source-checked
    claim: "Structured decoding can turn a schema or grammar state into an allowed-token mask, forcing generation to stay inside the formal constraint while leaving semantic truth and task success outside the guarantee."
    source_ids:
      - willard-2023-guided-generation
      - geng-2025-jsonschemabench
    support: "Willard and Louf support FSM/parser state plus token-logit masks that zero invalid vocabulary continuations. Geng et al. support constrained decoding as invalid-token masking from constraints and prefix tokens, and evaluate schema compliance separately from coverage, efficiency, and output quality."
    caveat: "Checks the formal constraint mechanism, not semantic correctness. Real JSON Schema guarantees depend on tokenizer handling, schema-feature coverage, implementation details, and validation semantics. Top-p-after-mask is a local implementation warning."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Willard and Louf support the mask mechanism: guided generation uses FSM/parser state to compute valid vocabulary continuations and zero invalid-token probability. Geng et al. support structured-output framing and the separation between schema compliance, coverage, efficiency, and output quality. Page math/code/demo are toy token-level witnesses; validity is formal, not truth/task success."
