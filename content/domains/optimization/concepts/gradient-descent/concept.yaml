claim_checks:
  - id: negative-gradient-local-descent
    status: source-checked
    claim: "Gradient descent uses the gradient as the direction of steepest local increase and updates parameters in the negative-gradient direction, with the learning rate controlling how far to trust the local approximation."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-06"
      reviewer: "codex+oracle"
      summary: "Checked Goodfellow et al. chapters 4.3 and 8.3 plus Boyd/Vandenberghe chapter 9: Goodfellow gives directional derivative u^T grad f, says -grad is downhill, gives x' = x - eps grad f with eps as positive learning rate, and uses Taylor expansion to show curvature can make too-large steps move uphill. Boyd frames descent as direction plus step size and states Euclidean steepest descent coincides with gradient descent."
    source_ids:
      - boyd-2004-convex-optimization
      - goodfellow-2016-deep-learning
    support: "Boyd and Vandenberghe ground descent methods, gradients, and step-size reasoning in convex optimization; Goodfellow et al. frame neural-network training as optimizing parameters of a cost function with gradient-based methods."
    caveat: "This checks the local first-order update mechanism, not a guarantee of global convergence for nonconvex neural-network losses."
