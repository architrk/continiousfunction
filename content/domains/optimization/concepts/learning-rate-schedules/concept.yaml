claim_checks:
  - id: schedule-shape-controls-update-scale
    status: source-checked
    claim: "Learning-rate schedules change the scalar learning rate over training. Smith supports LR range tests and cyclical policies that vary LR between bounds; SGDR supports cosine annealing with warm restarts. Warmup, inverse-sqrt decay, and LLM-oriented framing here are teaching extensions, not sourced by these papers."
    source_ids:
      - smith-2015-cyclical-learning-rates
      - loshchilov-2016-sgdr
    support: "Smith treats LR as a key hyperparameter, describes CLR varying between boundary values, and gives an LR range test for bounds. SGDR defines warm restarts by increasing LR after each run and decaying LR inside a run by cosine annealing. Page equations/code/demo render schedule curves but do not source warmup or LLM practice."
    caveat: "Does not check large-model warmup practice, Adam bias-correction warmup rationale, edge-of-stability claims, inverse-sqrt schedules, convergence guarantees, or universal schedule superiority; support is limited to LR range tests/CLR and SGDR cosine warm restarts."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Smith supports scalar LR as a key hyperparameter, CLR between min/max bounds, and an LR range test that linearly increases LR to choose bounds. Loshchilov and Hutter support SGDR restarts as LR increases while reusing parameters, plus cosine annealing from eta_max to eta_min within a run. Warmup, inverse-sqrt, LLM practice, Adam warmup, edge-of-stability, convergence, and universal-superiority material remains caveated teaching context."
    object_refs:
      - "#source-span-smith-2015-cyclical-learning-rates"
      - "#source-span-loshchilov-2016-sgdr"
      - "#math-object-1"
      - "#math-object-2"
      - "#code-witness-1"
      - "#interactive-demo"
short_description: "Schedule shapes that change the scalar learning-rate scale over training, with sourced CLR/range-test and SGDR cosine-restart examples plus caveated warmup/decay teaching patterns."
