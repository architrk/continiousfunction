claim_checks:
  - id: adam-moment-bias-corrected-adaptive-step
    status: source-checked
    claim: "Adam maintains exponential moving averages of gradients and squared gradients, bias-corrects both from zero initialization, and takes elementwise adaptive steps by subtracting alpha*mhat_t/(sqrt(vhat_t)+epsilon)."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-06"
      reviewer: "codex+oracle"
      summary: "Checked Kingma and Ba Algorithm 1 plus sections 2 and 3: the paper initializes m0 and v0 as zero vectors, updates biased first and second raw moment estimates from gt and gt^2, divides by 1-beta1^t and 1-beta2^t for bias correction, states vector operations are element-wise, and updates theta with alpha*mhat/(sqrt(vhat)+epsilon). Scope is original Adam update mechanics only."
    source_ids:
      - kingma-2014-adam
    support: "Kingma and Ba's Algorithm 1 initializes m0 and v0 to zero, updates biased first-moment and second raw-moment estimates from gt and gt^2, computes bias-corrected estimates, and updates parameters with alpha*mhat_t/(sqrt(vhat_t)+epsilon), with vector operations elementwise. The page's equations, code witness, and demo instantiate those mechanics and expose the per-coordinate effective step scaling."
    caveat: "This checks Adam's original adaptive-moment update mechanics, not convergence guarantees, AdamW decoupled weight decay, AMSGrad, optimizer generalization debates, sparse-gradient variants, or framework-specific implementation details."
