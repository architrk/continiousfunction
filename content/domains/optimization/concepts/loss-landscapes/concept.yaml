claim_checks:
  - id: sliced-landscape-sharpness-sam-neighborhood
    status: source-checked
    claim: "Loss-landscape visualizations are 1D/2D diagnostic slices through high-dimensional parameter space, not the full neural-network surface; sharpness/flatness depend on perturbation scale and network symmetries, and SAM minimizes worst-case training loss in a perturbation neighborhood."
    source_ids:
      - li-2017-loss-landscape-visualization
      - keskar-2016-sharp-minima
      - foret-2020-sam
    support: "Li supports 1D/2D slices and filter-wise normalization caveats. Keskar supports sharp/flat minima as perturbation-sensitivity diagnostics tied to generalization, while using an imperfect epsilon-scale-dependent metric. Foret supports SAM's neighborhood min-max objective and first-order perturbation approximation; local math anchors combine the quadratic, Delta_rho, SAM objective, and epsilon approximation."
    caveat: "Does not source edge-of-stability theory, 2/eta stability code, Stage 2 EdgeOfStabilityViz wording, real-network Hessian spectra beyond cited context, universal flat-minima guarantees, parameterization-invariant sharpness, or 3D surface; #interactive-demo means Stage 1 only."
    evidence_review:
      state: substantive-reviewed
      reviewed_at: "2026-05-07"
      reviewer: "codex+oracle"
      summary: "Li supports low-dimensional 1D/2D slices and filter-normalized comparisons. Keskar supports sharp/flat minima as perturbation-sensitivity diagnostics tied to generalization but with an imperfect epsilon-dependent metric. Foret supports SAM's worst-case neighborhood objective and first-order perturbation approximation. Reviewed scope excludes edge-of-stability, the 2/eta code, Stage 2, real-network Hessian spectra beyond cited context, universal flat-minima guarantees, and parameterization-invariant sharpness."
    object_refs:
      - "#source-span-li-2017-loss-landscape-visualization"
