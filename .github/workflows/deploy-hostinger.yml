name: Deploy (Hostinger FTP)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (static export -> out/)
        run: npm run build

      # Configure repository secrets:
      # - CF_FTP_HOST: ftp.continuousfunction.ai (or your FTP host)
      # - CF_FTP_USER: username
      # - CF_FTP_PASS: password
      # - CF_FTP_REMOTE_DIR: remote webroot directory (example: /public_html/)
      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CF_FTP_HOST }}
          username: ${{ secrets.CF_FTP_USER }}
          password: ${{ secrets.CF_FTP_PASS }}
          local-dir: out/
          server-dir: ${{ secrets.CF_FTP_REMOTE_DIR }}

